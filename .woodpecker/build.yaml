when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: restore-cache
    image: meltwater/drone-cache
    settings:
      access_key:
        from_secret: garage_s3_access_key
      secret_key:
        from_secret: garage_s3_secret_key
      restore: true
      backend: s3
      endpoint: http://garage.garage.svc.cluster.local:3900
      bucket: buildkit-cache
      region: garage
      path_style: true
      archive_format: zstd
      cache_key: "netzbremse-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache
        - node_modules

  - name: go-test
    image: golang:1.26.1-bookworm
    environment:
      GOMODCACHE: /woodpecker/src/sm-moshi/netzbremse/.go-mod-cache
    commands:
      - mkdir -p .go-mod-cache
      - go test ./...

  - name: browser-script-check
    image: dhi.io/node:24.14.0-debian13-dev
    commands:
      - node --check scripts/netzbremse-browser.mjs

  - name: release
    image: dhi.io/node:24.14.0-debian13-dev
    when:
      - event: push
        branch: main
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
      GH_TOKEN:
        from_secret: github_token
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends git ca-certificates
      - rm -rf /var/lib/apt/lists/*
      - rm -f .git/config.lock
      - git config user.name "woodpecker[bot]"
      - git config user.email "woodpecker@m0sh1.cc"
      - git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/sm-moshi/netzbremse.git"
      - git fetch --tags origin
      - npm ci
      - node node_modules/.bin/semantic-release

  - name: rebuild-cache
    image: meltwater/drone-cache
    settings:
      access_key:
        from_secret: garage_s3_access_key
      secret_key:
        from_secret: garage_s3_secret_key
      rebuild: true
      backend: s3
      endpoint: http://garage.garage.svc.cluster.local:3900
      bucket: buildkit-cache
      region: garage
      path_style: true
      archive_format: zstd
      cache_key: "netzbremse-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache
        - node_modules
