when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: restore-cache
    failure: ignore
    image: meltwater/drone-cache@sha256:f4429bda3e4f2af2cceb40deee10b8cc5613aae7c8b08ad15c54109cad7fa9a3
    settings:
      access_key:
        from_secret: garage_s3_access_key
      secret_key:
        from_secret: garage_s3_secret_key
      restore: true
      backend: s3
      endpoint: http://garage.garage.svc.cluster.local:3900
      bucket: buildkit-cache
      region: garage
      path_style: true
      archive_format: zstd
      cache_key: "netzbremse-{{ checksum \"go.sum\" }}-{{ checksum \"package-lock.json\" }}"
      mount:
        - .go-mod-cache
        - .npm-cache

  - name: go-test
    image: dhi.io/golang:1.26.1-debian13-dev@sha256:0517a2c5ce6ab35fadf27bc7e2a2e3188c379af9fa9f59c20b3cfea7d926aca6
    environment:
      GOMODCACHE: /woodpecker/src/github.com/sm-moshi/netzbremse/.go-mod-cache
    commands:
      - mkdir -p .go-mod-cache
      - go test ./...

  - name: browser-script-check
    image: dhi.io/node:25.8.1-debian13-dev@sha256:eed182aa374d99396752f2ef6e122f6642386485783d9e5b9802571ce63f9b4c
    commands:
      - node --check scripts/netzbremse-browser.mjs

  - name: release
    image: dhi.io/node:25.8.1-debian13-dev@sha256:eed182aa374d99396752f2ef6e122f6642386485783d9e5b9802571ce63f9b4c
    when:
      - event: push
        branch: main
    environment:
      npm_config_cache: /woodpecker/src/github.com/sm-moshi/netzbremse/.npm-cache
      GITHUB_TOKEN:
        from_secret: github_token
      GH_TOKEN:
        from_secret: github_token
    commands:
      - |
        [ -n "$APT_PROXY_HOST" ] && echo "Acquire::http::Proxy \"http://$APT_PROXY_HOST:${APT_PROXY_PORT:-3142}\";" > /etc/apt/apt.conf.d/00proxy
        [ "$APT_FORCE_IPV4" = "true" ] && echo 'Acquire::ForceIPv4 "true";' > /etc/apt/apt.conf.d/99force-ipv4
      - apt-get update
      - apt-get install -y --no-install-recommends git ca-certificates
      - rm -rf /var/lib/apt/lists/*
      - rm -f .git/config.lock
      - git config user.name "woodpecker[bot]"
      - git config user.email "woodpecker@m0sh1.cc"
      - git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/sm-moshi/netzbremse.git"
      - git fetch --tags origin
      - npm ci
      - node node_modules/.bin/semantic-release

  - name: rebuild-cache
    failure: ignore
    image: meltwater/drone-cache@sha256:f4429bda3e4f2af2cceb40deee10b8cc5613aae7c8b08ad15c54109cad7fa9a3
    settings:
      access_key:
        from_secret: garage_s3_access_key
      secret_key:
        from_secret: garage_s3_secret_key
      rebuild: true
      backend: s3
      endpoint: http://garage.garage.svc.cluster.local:3900
      bucket: buildkit-cache
      region: garage
      path_style: true
      archive_format: zstd
      cache_key: "netzbremse-{{ checksum \"go.sum\" }}-{{ checksum \"package-lock.json\" }}"
      mount:
        - .go-mod-cache
        - .npm-cache
