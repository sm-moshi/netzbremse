when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: go-test
    image: golang:1.26.1-bookworm
    commands:
      - go test ./...

  - name: browser-script-check
    image: node:22-bookworm-slim
    commands:
      - node --check scripts/netzbremse-browser.mjs

  - name: release
    image: node:22-bookworm-slim
    when:
      - event: push
        branch: main
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - npm ci
      - npx semantic-release
