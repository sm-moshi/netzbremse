when:
  - event: tag
    ref: refs/tags/v*

variables:
  - &measurement_image "ghcr.io/sm-moshi/netzbremse-measurement"
  - &dashboard_image "ghcr.io/sm-moshi/netzbremse-dashboard"
  - &harbor_measurement_image "harbor.m0sh1.cc/apps/netzbremse-measurement"
  - &harbor_dashboard_image "harbor.m0sh1.cc/apps/netzbremse-dashboard"

steps:
  - name: build-and-push-measurement
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      registry: ghcr.io
      repo: *measurement_image
      context: .
      dockerfile: Dockerfile.measurement
      logins:
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_token
      tags:
        - "${CI_COMMIT_TAG##v}"
        - latest
      username:
        from_secret: github_username
      password:
        from_secret: github_token

  - name: build-and-push-dashboard
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      registry: ghcr.io
      repo: *dashboard_image
      context: .
      dockerfile: Dockerfile.dashboard
      logins:
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_token
      tags:
        - "${CI_COMMIT_TAG##v}"
        - latest
      username:
        from_secret: github_username
      password:
        from_secret: github_token

  - name: mirror-measurement-to-harbor
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on:
      - build-and-push-measurement
    settings:
      registry: harbor.m0sh1.cc
      repo: *harbor_measurement_image
      context: .
      dockerfile: Dockerfile.measurement
      logins:
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_token
      tags:
        - "${CI_COMMIT_TAG##v}"
        - latest
      username:
        from_secret: harbor_username
      password:
        from_secret: harbor_token

  - name: mirror-dashboard-to-harbor
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on:
      - build-and-push-dashboard
    settings:
      registry: harbor.m0sh1.cc
      repo: *harbor_dashboard_image
      context: .
      dockerfile: Dockerfile.dashboard
      logins:
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_token
      tags:
        - "${CI_COMMIT_TAG##v}"
        - latest
      username:
        from_secret: harbor_username
      password:
        from_secret: harbor_token
